<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BrokerAI - Seguros Argentinos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

    <!-- AD-MOB SPACE (BARRA SUPERIOR) -->
    <div class="h-12 w-full bg-black/50 flex items-center justify-center text-[10px] text-slate-500 uppercase tracking-widest border-b border-slate-800">
        Publicidad Patrocinada
    </div>

    <nav class="p-4 border-b border-slate-800 bg-slate-900/90 backdrop-blur-md sticky top-0 z-50">
        <div class="flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-500 italic">BROKER<span class="text-white font-light">AI</span></h1>
            <select id="lang-selector" class="bg-slate-800 text-xs p-1 rounded border border-slate-700 outline-none">
                <option value="es">Español 🇦🇷</option>
                <option value="en">English 🇺🇸</option>
            </select>
        </div>
    </nav>

    <main class="p-4 max-w-xl mx-auto">
        <!-- AGENTE IA CONTAINER -->
        <div id="chat-container" class="bg-slate-800 rounded-3xl shadow-2xl min-h-[70vh] flex flex-col overflow-hidden border border-slate-700">
            <div id="chat-box" class="flex-grow p-4 overflow-y-auto space-y-4 text-sm leading-relaxed">
                <!-- Los mensajes aparecen aquí -->
            </div>

            <!-- INPUT AREA -->
            <div class="p-4 bg-slate-900/50 border-t border-slate-700">
                <div class="flex gap-2">
                    <input type="text" id="user-input" placeholder="..." class="flex-1 bg-slate-800 border border-slate-600 p-3 rounded-2xl outline-none focus:border-blue-500 transition-all italic text-white">
                    <button id="send-btn" class="bg-blue-600 p-3 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                        ➤
                    </button>
                </div>
            </div>
        </div>

        <!-- AREA DE RESULTADOS (OCULTA INICIALMENTE) -->
        <div id="results-area" class="mt-6 hidden animate-bounce-in">
            <div class="bg-gradient-to-br from-emerald-900 to-emerald-950 p-6 rounded-3xl border-2 border-emerald-500 shadow-xl shadow-emerald-900/20">
                <h3 id="res-title" class="text-emerald-400 font-black mb-2 text-lg underline"></h3>
                <div id="res-text" class="text-slate-100 italic space-y-4"></div>
                <button id="cta-button" class="w-full mt-6 bg-emerald-500 text-black font-black p-4 rounded-2xl shadow-lg hover:bg-emerald-400 transition-all uppercase italic">
                </button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
